<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة النجاح التعليمية - الإدارة</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #059669;
            --danger: #e11d48;
            --warning: #d97706;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); margin: 0; color: #1e293b; }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, var(--primary), #1e40af); color: white; border-radius: 0 0 50px 50px; margin-bottom: 30px; box-shadow: 0 10px 25px rgba(37,99,235,0.2); }

        .nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { padding: 12px 25px; border: none; background: #e2e8f0; border-radius: 12px; cursor: pointer; font-weight: 700; white-space: nowrap; transition: 0.3s; color: var(--secondary); }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(37,99,235,0.3); }

        .card { background: var(--card); border-radius: 20px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #e2e8f0; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--secondary); }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

        .btn { padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; width: 100%; justify-content: center; }
        .btn-success { background: var(--success); color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* إحصائيات */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .stat-card { background: #f1f5f9; padding: 15px; border-radius: 15px; text-align: center; }
        .stat-val { display: block; font-size: 24px; font-weight: 900; color: var(--primary); }
        .stat-label { font-size: 13px; color: var(--secondary); }

        /* الرصد الجماعي */
        .bulk-student-box { border: 2px solid #f1f5f9; border-radius: 15px; padding: 15px; margin-bottom: 20px; background: #fff; position: relative; }
        .grid-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 5px; background: #f8fafc; padding: 8px; border-radius: 8px; font-weight: 700; margin-bottom: 10px; }
        .bulk-row-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 5px; align-items: center; margin-bottom: 5px; }
        .bulk-row-grid input { padding: 5px; text-align: center; font-size: 14px; }

        /* الشهادة */
        .cert-header { text-align: center; border-bottom: 3px double var(--primary); padding-bottom: 15px; margin-bottom: 20px; }
        .cert-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .cert-table th, .cert-table td { border: 1px solid #cbd5e1; padding: 12px; text-align: center; }
        .cert-table th { background: #f8fafc; }
        .status-badge { padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .status-pass { background: #dcfce7; color: #166534; }
        .status-fail { background: #fee2e2; color: #991b1b; }

        @media (max-width: 600px) {
            .grid-header, .bulk-row-grid { grid-template-columns: 1.5fr 1fr 0.8fr 1fr 0.8fr; font-size: 11px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>منظومة النجاح التعليمية</h1>
    <p>إدارة البيانات ورصد الدرجات</p>
</div>

<div class="container">
    <!-- التبويبات -->
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showTab('addTab')"><i class="fas fa-user-plus"></i> إضافة طالبة</button>
        <button class="tab-btn" onclick="showTab('bulkTab')"><i class="fas fa-edit"></i> الرصد الجماعي</button>
        <button class="tab-btn" onclick="showTab('statsTab')"><i class="fas fa-chart-pie"></i> الإحصائيات</button>
        <button class="tab-btn" onclick="showTab('searchTab')"><i class="fas fa-search"></i> استخراج شهادة</button>
    </div>

    <!-- 1. إضافة طالبة -->
    <div id="addTab" class="tab-content">
        <div class="card">
            <h3 style="margin-top:0"><i class="fas fa-id-card"></i> بيانات الطالبة الجديدة</h3>
            <div class="form-group">
                <label>الاسم الرباعي</label>
                <input type="text" id="stdName" placeholder="أدخل اسم الطالبة">
            </div>
            <div class="form-group">
                <label>الرقم الوطني / القيد</label>
                <input type="text" id="stdID" placeholder="أدخل رقم فريد">
            </div>
            <div class="form-group">
                <label>الصف الدراسي</label>
                <select id="stdYear">
                    <option value="1">الصف الأول</option>
                    <option value="2">الصف الثاني</option>
                    <option value="3">الصف الثالث</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="addStudent()"><i class="fas fa-save"></i> حفظ البيانات</button>
        </div>
    </div>

    <!-- 2. الرصد الجماعي -->
    <div id="bulkTab" class="tab-content" style="display:none">
        <div class="card">
            <div class="form-group">
                <label>اختر الصف للرصد</label>
                <select id="bulkSelectYear" onchange="loadBulkStudentsList()">
                    <option value="">-- اختر الصف --</option>
                    <option value="1">الصف الأول</option>
                    <option value="2">الصف الثاني</option>
                    <option value="3">الصف الثالث</option>
                </select>
            </div>
            <div id="bulkStudentsContainer"></div>
            <button id="saveAllBulkBtn" class="btn btn-success" style="display:none; width:100%; margin-top:20px" onclick="saveAllBulkData()">
                <i class="fas fa-check-double"></i> حفظ جميع الدرجات المرصودة
            </button>
        </div>
    </div>

    <!-- 3. إحصائيات الصفوف -->
    <div id="statsTab" class="tab-content" style="display:none">
        <div class="card">
            <div class="form-group">
                <label>اختر الصف لعرض النتائج</label>
                <select id="statsSelectYear" onchange="loadClassStats()">
                    <option value="">-- اختر الصف --</option>
                    <option value="1">الصف الأول</option>
                    <option value="2">الصف الثاني</option>
                    <option value="3">الصف الثالث</option>
                </select>
            </div>
            
            <div id="statsContent" style="display:none">
                <div class="stats-grid">
                    <div class="stat-card"><span id="countTotal" class="stat-val">0</span><span class="stat-label">إجمالي الطالبات</span></div>
                    <div class="stat-card"><span id="passPercent" class="stat-val">0%</span><span class="stat-label">نسبة النجاح</span></div>
                    <div class="stat-card" style="border-bottom: 3px solid var(--success);"><span id="countPass" class="stat-val" style="color:var(--success)">0</span><span class="stat-label">عدد الناجحات</span></div>
                    <div class="stat-card" style="border-bottom: 3px solid var(--danger);"><span id="countFail" class="stat-val" style="color:var(--danger)">0</span><span class="stat-label">عدد الراسبات</span></div>
                </div>

                <div style="margin-top:20px; overflow-x:auto;">
                    <table style="width:100%; border-collapse: collapse;">
                        <thead>
                            <tr style="background:#f1f5f9;">
                                <th style="padding:10px; text-align:right;">اسم الطالبة (اضغط للمعاينة)</th>
                                <th style="padding:10px;">الحالة</th>
                            </tr>
                        </thead>
                        <tbody id="statsTbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 4. استخراج شهادة -->
    <div id="searchTab" class="tab-content" style="display:none">
        <div class="card">
            <div class="form-group">
                <label>أدخل الرقم الوطني</label>
                <input type="text" id="searchID" placeholder="مثال: 12345">
            </div>
            <button class="btn btn-primary" onclick="loadResult()"><i class="fas fa-search"></i> عرض الشهادة</button>
        </div>
        <div id="resultArea"></div>
    </div>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        databaseURL: "https://your-project-id.firebaseio.com" // استبدل برابط قاعدة بياناتك
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // المواد الدراسية لكل صف
    const schoolSubjects = {
        "1": ["القرآن الكريم", "التربية الإسلامية", "اللغة العربية", "اللغة الإنجليزية", "الرياضيات", "العلوم"],
        "2": ["القرآن الكريم", "التربية الإسلامية", "اللغة العربية", "اللغة الإنجليزية", "الرياضيات", "العلوم", "التاريخ", "الجغرافيا"],
        "3": ["القرآن الكريم", "التربية الإسلامية", "اللغة العربية", "اللغة الإنجليزية", "الرياضيات", "الفيزياء", "الكيمياء", "الأحياء"]
    };

    // التنقل بين التبويبات
    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).style.display = 'block';
        event.currentTarget.classList.add('active');
    }

    // إضافة طالبة
    function addStudent() {
        const name = document.getElementById('stdName').value;
        const id = document.getElementById('stdID').value;
        const year = document.getElementById('stdYear').value;

        if(!name || !id) return alert("يرجى ملء البيانات");

        db.ref('students/' + id).set({
            name: name,
            year: year,
            createdAt: Date.now()
        }).then(() => {
            alert("تمت الإضافة بنجاح");
            document.getElementById('stdName').value = "";
            document.getElementById('stdID').value = "";
        });
    }

    // تحميل قائمة الرصد الجماعي
    function loadBulkStudentsList() {
        const yr = document.getElementById('bulkSelectYear').value;
        const container = document.getElementById('bulkStudentsContainer');
        if(!yr) { container.innerHTML = ""; return; }
        
        container.innerHTML = "<p style='text-align:center'>جاري التحميل...</p>";
        
        db.ref('students').orderByChild('year').equalTo(yr).once('value', snap => {
            if(!snap.exists()) { container.innerHTML = "لا يوجد طالبات في هذا الصف"; return; }
            
            let arr = [];
            snap.forEach(child => { arr.push({id: child.key, ...child.val()}); });
            arr.sort((a,b) => a.name.localeCompare(b.name, 'ar'));

            let h = "";
            arr.forEach(s => {
                h += `
                <div class="bulk-student-box" data-id="${s.id}">
                    <button onclick="bulkDelete('${s.id}', '${s.name}')" style="position: absolute; left: 10px; top: 10px; background: none; border: none; color: var(--danger); cursor: pointer; font-size: 18px;"><i class="fas fa-trash-alt"></i></button>
                    <strong style="display:block; margin-bottom:10px; color:var(--primary); text-align:center;">${s.name}</strong>
                    <div class="grid-header">
                        <div>المادة</div><div>أعمال</div><div>من</div><div>امتحان</div><div>من</div>
                    </div>`;
                
                schoolSubjects[yr].forEach(sub => {
                    const d = (s.subjects && s.subjects[sub]) ? s.subjects[sub] : {wG:'', eG:'', wM:40, eM:60};
                    h += `
                    <div class="bulk-row-grid" data-sub="${sub}">
                        <span>${sub}</span>
                        <input type="number" class="bw-g" value="${d.wG}">
                        <input type="number" class="bw-m" value="${d.wM}">
                        <input type="number" class="be-g" value="${d.eG}">
                        <input type="number" class="be-m" value="${d.eM}">
                    </div>`;
                });
                h += `</div>`;
            });
            container.innerHTML = h;
            document.getElementById('saveAllBulkBtn').style.display = 'block';
        });
    }

    // حذف طالبة من الرصد الجماعي
    function bulkDelete(id, name) {
        if(confirm(`هل أنت متأكد من حذف (${name}) نهائياً؟`)) {
            db.ref('students/' + id).remove().then(() => {
                loadBulkStudentsList();
            });
        }
    }

    // حفظ جميع الدرجات
    function saveAllBulkData() {
        const boxes = document.querySelectorAll('.bulk-student-box');
        let updates = {};

        boxes.forEach(box => {
            const sid = box.getAttribute('data-id');
            const rows = box.querySelectorAll('.bulk-row-grid');
            let subjectsData = {};

            rows.forEach(row => {
                const subName = row.getAttribute('data-sub');
                const wg = parseFloat(row.querySelector('.bw-g').value) || 0;
                const wm = parseFloat(row.querySelector('.bw-m').value) || 0;
                const eg = parseFloat(row.querySelector('.be-g').value) || 0;
                const em = parseFloat(row.querySelector('.be-m').value) || 0;
                subjectsData[subName] = { wG: wg, wM: wm, eG: eg, eM: em, sum: (wg+eg), max: (wm+em) };
            });
            updates[`students/${sid}/subjects`] = subjectsData;
        });

        db.ref().update(updates).then(() => alert("تم حفظ جميع الدرجات بنجاح"));
    }

    // إحصائيات الصفوف
    function loadClassStats() {
        const yr = document.getElementById('statsSelectYear').value;
        const content = document.getElementById('statsContent');
        const tbody = document.getElementById('statsTbody');
        if(!yr) return;

        db.ref('students').orderByChild('year').equalTo(yr).once('value', snap => {
            let total = 0, passed = 0, failed = 0;
            let rows = "";
            
            snap.forEach(c => {
                total++;
                const s = c.val();
                let isFail = false;
                if(!s.subjects) isFail = true;
                else {
                    for(let k in s.subjects) {
                        if(s.subjects[k].sum < (s.subjects[k].max/2)) { isFail = true; break; }
                    }
                }
                if(isFail) failed++; else passed++;

                rows += `<tr style="border-bottom:1px solid #eee; cursor:pointer;" onclick="viewCertDirectly('${c.key}')">
                    <td style="padding:10px; color:var(--primary); font-weight:bold;">${s.name}</td>
                    <td style="padding:10px; text-align:center;"><span class="status-badge ${isFail?'status-fail':'status-pass'}">${isFail?'دور ثانٍ':'ناجحة'}</span></td>
                </tr>`;
            });

            document.getElementById('countTotal').innerText = total;
            document.getElementById('countPass').innerText = passed;
            document.getElementById('countFail').innerText = failed;
            document.getElementById('passPercent').innerText = total > 0 ? ((passed/total)*100).toFixed(1) + "%" : "0%";
            tbody.innerHTML = rows;
            content.style.display = 'block';
        });
    }

    // عرض الشهادة فوراً للمطور
    function viewCertDirectly(id) {
        showTab('searchTab');
        document.getElementById('searchID').value = id;
        loadResult();
    }

    // عرض النتيجة (الشهادة)
    function loadResult() {
        const id = document.getElementById('searchID').value;
        const area = document.getElementById('resultArea');
        if(!id) return;

        db.ref('students/' + id).once('value', snap => {
            if(!snap.exists()) { area.innerHTML = "الرقم غير موجود"; return; }
            const s = snap.val();
            let tableHtml = "";
            let overallFail = false;

            for(let sub in s.subjects) {
                const d = s.subjects[sub];
                const isSubFail = d.sum < (d.max/2);
                if(isSubFail) overallFail = true;
                tableHtml += `<tr>
                    <td>${sub}</td><td>${d.wG} / ${d.wM}</td><td>${d.eG} / ${d.eM}</td>
                    <td style="color:${isSubFail?'red':'green'}">${d.sum} / ${d.max}</td>
                </tr>`;
            }

            area.innerHTML = `
                <div class="card" id="printableCert">
                    <div class="cert-header">
                        <h2>شهادة إثبات مستوى دراسي</h2>
                        <p>اسم الطالبة: <strong>${s.name}</strong></p>
                        <p>الصف: <strong>${s.year}</strong> | الرقم: <strong>${id}</strong></p>
                    </div>
                    <table class="cert-table">
                        <thead><tr><th>المادة</th><th>أعمال السنة</th><th>الامتحان النهائي</th><th>المجموع</th></tr></thead>
                        <tbody>${tableHtml}</tbody>
                    </table>
                    <div style="margin-top:20px; text-align:center;">
                        النتيجة النهائية: <span class="status-badge ${overallFail?'status-fail':'status-pass'}">${overallFail?'دور ثانٍ':'ناجحة وموقرة'}</span>
                    </div>
                </div>
            `;
        });
    }
</script>

</body>
</html>
