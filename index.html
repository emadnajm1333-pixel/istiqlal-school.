<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة نتائج امتحانات مدرسة الاستقلال</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #1e3a8a; --accent: #b45309; --bg: #f1f5f9; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); text-align: center; padding: 20px; }
        .main-card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        
        /* هذا الجزء هو الذي سيعرض الصورة */
        .school-logo { 
            width: 160px; height: 160px; 
            margin: 0 auto 20px; 
            background-image: url('1000255616.jpg'); /* نستخدمها كخلفية لضمان الثبات */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 15px;
            cursor: pointer;
        }

        h1 { color: var(--primary); font-size: 22px; margin: 0; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 10px; border: 2px solid #cbd5e1; text-align: center; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 18px; }
        .footer { margin-top: 30px; color: #64748b; font-weight: bold; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="school-logo" ondblclick="enterAdmin()">
        <img src="1000255616.jpg" style="width:100%; height:100%; object-fit:contain;" onerror="this.style.display='none'">
    </div>

    <h1>مدرسة الإستقلال للتعليم الأساسي</h1>
    <p style="margin-top:5px; color:#64748b;">نظام استخراج النتائج 2026</p>

    <input type="number" id="searchID" placeholder="أدخل الرقم الوطني للطالبة">
    <button class="btn" onclick="loadResult()">استخراج النتيجة</button>

    <div id="resultArea"></div>
    <div class="footer">تم تطويره بواسطة عماد الدين نجم</div>
</div>

<script>
    // إعدادات قاعدة البيانات الخاصة بك
    const firebaseConfig = {
      apiKey: "AIzaSyDKEPjQMKD2lt74sdGM0k7hY2Wb8E-X55g", 
      databaseURL: "https://istiqlal-school-302c8-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school-302c8",
      appId: "1:1037263844752:web:56dc0ba0d346045610a514"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function loadResult() {
        const id = document.getElementById('searchID').value;
        if(!id) return alert("يرجى إدخال الرقم");
        db.ref('students/' + id).once('value', snap => {
            if(snap.exists()) {
                const data = snap.val();
                alert("تم العثور على الطالبة: " + data.name);
                confetti({ particleCount: 150, spread: 70 });
            } else {
                alert("الرقم غير موجود");
            }
        });
    }

    function enterAdmin() {
        const p = prompt("رمز المطور:");
        if(p === "123") alert("مرحباً عماد"); // يمكنك تغيير الرمز
    }
</script>

</body>
</html>
