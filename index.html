<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدرسة الاستقلال للتعليم الأساسي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #1e3a8a;
            --accent: #b45309;
            --success: #059669;
            --danger: #e11d48;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #000000;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; background: var(--bg); color: #1e293b; padding: 10px; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* التنسيق الجديد للجدول لضمان الوضوح التام */
        .res-table { width: 100%; border-collapse: collapse; border: 2.5px solid var(--border); background: #fff; margin-top: 10px; }
        .res-table th, .res-table td { border: 1.5px solid var(--border); text-align: center; padding: 10px 5px; font-weight: 800; color: #000; font-size: 14px; }
        .res-table th { background: #f1f5f9; font-size: 13px; }
        
        .sub-name-cell { background: #fafafa; font-size: 15px; font-weight: 900; }
        .detail-cell { font-size: 12px; color: #444; background: #fff; }

        .main-card { background: var(--card); border-radius: 15px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid #e2e8f0; }

        .summary-box { border: 2.5px solid #000; background: #fff; padding: 10px; margin-top: 15px; }
        .success-msg { color: var(--success); font-weight: 900; font-size: 18px; margin: 10px 0; }
        .fail-msg { color: var(--danger); font-weight: 900; font-size: 18px; margin: 10px 0; }

        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }

        #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .admin-section { display: none; margin-top: 20px; }
        .admin-section.active { display: block; }
        .data-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr 1fr; gap: 5px; margin-bottom: 8px; }
        input { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; text-align: center; }

        @media print {
            .btn, .search-container, .admin-portal-link, .whatsapp-float { display: none !important; }
            body { background: white; padding: 0; }
            .main-card { border: none; box-shadow: none; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner"></div></div>

<div class="container" id="mainContent">
    <div class="main-card">
        <div id="searchView">
            <div style="text-align:center; margin-bottom:20px;">
                <div ondblclick="showAdminLogin()"><img src="1000255629.jpg" style="width: 110px; border-radius: 15px; cursor:pointer;"></div>
                <h1 style="margin: 5px 0; font-size: 24px; color: var(--primary); font-weight: 900;">مدرسة الاستقلال للتعليم الأساسي</h1>
                <p style="font-weight: 700; color: #64748b;">منظومة النتائج الإلكترونية - 2026</p>
            </div>
            
            <div style="max-width: 450px; margin: 0 auto;">
                <input type="number" id="studentID" placeholder="أدخل الرقم الوطني للطالبة..." style="font-size: 16px; padding: 15px;">
                <button class="btn btn-primary" onclick="fetchResult()"><i class="fas fa-search"></i> عرض النتيجة الآن</button>
            </div>
        </div>

        <div id="resultDisplay" style="display:none;">
            <div style="text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 15px;">
                <h2 id="studentName" style="margin: 0; font-size: 22px; color: #000;"></h2>
                <div id="studentYear" style="font-weight: 800; color: var(--accent); margin-top: 5px;"></div>
            </div>

            <table class="res-table">
                <thead>
                    <tr>
                        <th style="width: 25%;">المادة الدراسية</th>
                        <th style="width: 15%;">التفاصيل</th>
                        <th style="width: 10%;">المقرر</th>
                        <th style="width: 10%;">فصل 1</th>
                        <th style="width: 10%;">فصل 2</th>
                        <th style="width: 10%;">المجموع</th>
                        <th style="width: 10%;">الصغرى</th>
                        <th style="width: 10%;">النتيجة</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>

            <div class="summary-box">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>إجمالي الدرجات:</span><span id="finalSum" style="font-weight:900;"></span></div>
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>النسبة المئوية:</span><span id="finalPercent" style="font-weight:900;"></span></div>
                <div style="display:flex; justify-content:space-between; border-top: 1px solid #ccc; pt: 5px;"><span>التقدير العام:</span><span id="finalGrade" style="font-weight:900;"></span></div>
                
                <div id="personalMsg" style="text-align:center; margin-top:15px; padding:10px; border:1px dashed #000; font-weight:700; color:var(--primary);"></div>
                
                <div style="text-align:center; margin-top:15px; font-size:16px; font-weight:900; color:#000;">
                    تمنياتنا بالتوفيق لجميع طالباتنا
                </div>
            </div>

            <div id="failList" style="display:none; background:#fff1f2; border:2px solid var(--danger); padding:10px; margin-top:10px; text-align:center;">
                <b style="color:var(--danger)">مواد الدور الثاني:</b> <span id="failedItems" style="font-weight:900;"></span>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
                <button class="btn" style="background:#334155; color:white;" onclick="window.print()"><i class="fas fa-print"></i> طباعة الشهادة</button>
                <button class="btn" style="background:#cbd5e1;" onclick="location.reload()">بحث عن طالبة أخرى</button>
            </div>
        </div>
    </div>
    <div style="text-align: center; margin-top: 20px; font-weight: 700;">المطور: عماد الدين نجم</div>
</div>

<!-- نظام الإدارة (الرصد) -->
<div id="adminPortal" style="display:none;" class="container">
    <div class="main-card">
        <h2 style="text-align:center;">بوابة رصد الدرجات</h2>
        <input type="number" id="admID" placeholder="الرقم الوطني">
        <input type="text" id="admName" placeholder="الاسم الكامل">
        <select id="admYear" onchange="generateEntryRows()" style="width:100%; padding:10px; margin:10px 0;">
            <option value="">-- اختر الصف --</option>
            <option value="خامس">خامس</option><option value="سابع">سابع</option>
        </select>
        <div id="entryContainer"></div>
        <button class="btn btn-primary" onclick="saveData()">حفظ وإرسال للبيانات</button>
        <button class="btn" style="background:#eee;" onclick="location.reload()">خروج</button>
    </div>
</div>

<script>
    // الإعدادات الأصلية (لا تلمس)
    const firebaseConfig = {
      apiKey: "AIzaSyDKEPjQMKD2lt74sdGM0k796icnyFTmmIQ",
      authDomain: "istiqlal-school-302c8.firebaseapp.com",
      databaseURL: "https://istiqlal-school-302c8-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school-302c8",
      storageBucket: "istiqlal-school-302c8.firebasestorage.app",
      appId: "1:1037263844752:web:56dc0badd84262b5e3ef15"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const subjectsList = {
        "خامس": ["التربية الإسلامية", "اللغة العربية", "الكتابة", "اللغة الإنجليزية", "الحاسوب", "الرياضيات", "العلوم", "الاجتماعيات"],
        "سابع": ["التربية الإسلامية", "اللغة العربية", "الكتابة", "اللغة الإنجليزية", "الحاسوب", "الرياضيات", "العلوم", "التاريخ", "الجغرافيا"]
    };

    function fetchResult() {
        const id = document.getElementById('studentID').value;
        if(!id) return alert("أدخل الرقم الوطني أولاً");
        document.getElementById('loadingOverlay').style.display='flex';
        
        db.ref('students/'+id).once('value', snap => {
            document.getElementById('loadingOverlay').style.display='none';
            if(snap.exists()) renderStudent(snap.val());
            else alert("عذراً، هذا الرقم غير مسجل لدينا.");
        });
    }

    function renderStudent(data) {
        document.getElementById('searchView').style.display = 'none';
        document.getElementById('resultDisplay').style.display = 'block';
        document.getElementById('studentName').innerText = data.name;
        document.getElementById('studentYear').innerText = "الصف: " + data.year;

        let rows = ""; let fails = []; let isPassed = true;
        for(let key in data.subjects) {
            const s = data.subjects[key];
            const subFail = s.sum < (s.max/2);
            if(subFail) { isPassed = false; fails.push(key); }

            // سطرين لكل مادة لضمان الوضوح التام
            rows += `
                <tr>
                    <td rowspan="2" class="sub-name-cell">${key}</td>
                    <td class="detail-cell">أعمال السنة</td>
                    <td>${s.f1wM}</td><td>${s.f1w}</td><td>${s.f2w}</td>
                    <td rowspan="2">${s.sum}</td><td rowspan="2">${s.max/2}</td>
                    <td rowspan="2" style="color:${subFail?'red':'green'}">${subFail?'دور ثان':'ناجحة'}</td>
                </tr>
                <tr>
                    <td class="detail-cell">امتحان النهائي</td>
                    <td>${s.f1eM}</td><td>${s.f1e}</td><td>${s.f2e}</td>
                </tr>
            `;
        }
        document.getElementById('tableBody').innerHTML = rows;
        document.getElementById('finalSum').innerText = data.totalGot + " / " + data.totalMax;
        document.getElementById('finalPercent').innerText = data.percent + "%";
        
        const g = document.getElementById('finalGrade');
        const m = document.getElementById('personalMsg');
        
        if(!isPassed) {
            g.innerText = "دور ثانٍ"; g.style.color = "red";
            document.getElementById('failList').style.display = 'block';
            document.getElementById('failedItems').innerText = fails.join(" - ");
            m.innerText = "لا تحزني، الفرصة ما زالت أمامك في الدور الثاني. شدي حيلك! 💪";
        } else {
            document.getElementById('failList').style.display = 'none';
            let p = parseFloat(data.percent);
            if(p >= 85) { g.innerText = "ممتاز"; m.innerText = "مبارك التفوق! أنتِ فخر للمدرسة. 🌟"; }
            else if(p >= 75) { g.innerText = "جيد جداً"; m.innerText = "أداء رائع، استمري في التميز. ✨"; }
            else { g.innerText = "ناجحة"; m.innerText = "مبارك النجاح، وبالتوفيق في العام القادم. 🌹"; }
            confetti({ particleCount: 150, spread: 60, origin: { y: 0.7 } });
        }
    }

    function generateEntryRows() {
        const yr = document.getElementById('admYear').value;
        const container = document.getElementById('entryContainer');
        container.innerHTML = "";
        if(subjectsList[yr]) subjectsList[yr].forEach(s => {
            const isMain = (s==="اللغة العربية" || s==="الرياضيات" || s==="اللغة الإنجليزية");
            const d = document.createElement('div');
            d.className = "data-grid";
            d.innerHTML = `
                <input type="text" value="${s}" readonly style="background:#f1f5f9;">
                <input type="number" class="f1w" placeholder="أعمال ف1">
                <input type="number" class="f1wM" value="${isMain?32:16}">
                <input type="number" class="f1e" placeholder="امتحان ف1">
                <input type="number" class="f1eM" value="${isMain?48:24}">
                <input type="number" class="f2w" placeholder="أعمال ف2">
                <input type="number" class="f2e" placeholder="امتحان ف2">
            `;
            container.appendChild(d);
        });
    }

    function saveData() {
        const id = document.getElementById('admID').value;
        const name = document.getElementById('admName').value;
        const yr = document.getElementById('admYear').value;
        if(!id || !name || !yr) return alert("يرجى إكمال البيانات الأساسية");

        let subs = {}; let tG = 0; let tM = 0;
        document.querySelectorAll('#entryContainer .data-grid').forEach(row => {
            const n = row.querySelector('input[type="text"]').value;
            const f1w = parseFloat(row.querySelector('.f1w').value) || 0;
            const f1wM = parseFloat(row.querySelector('.f1wM').value) || 0;
            const f1e = parseFloat(row.querySelector('.f1e').value) || 0;
            const f1eM = parseFloat(row.querySelector('.f1eM').value) || 0;
            const f2w = parseFloat(row.querySelector('.f2w').value) || 0;
            const f2e = parseFloat(row.querySelector('.f2e').value) || 0;
            const sum = f1w + f1e + f2w + f2e;
            const max = (f1wM + f1eM) * 2;
            subs[n] = { f1w, f1wM, f1e, f1eM, f2w, f2e, sum, max };
            tG += sum; tM += max;
        });

        db.ref('students/'+id).set({
            name, year: yr, subjects: subs, totalGot: tG, totalMax: tM, percent: ((tG/tM)*100).toFixed(1)
        }).then(() => alert("تم حفظ بيانات الطالبة بنجاح ✅"));
    }

    function showAdminLogin() {
        const p = prompt("أدخل رمز الدخول للإدارة:");
        db.ref('settings/dev_pass').once('value', snap => {
            if(p === snap.val()) {
                document.getElementById('mainContent').style.display = 'none';
                document.getElementById('adminPortal').style.display = 'block';
            } else alert("الرمز خاطئ!");
        });
    }
</script>

    <i class="fab fa-whatsapp"></i> تواصل مع الإدارة
</a>

</body>
</html>
