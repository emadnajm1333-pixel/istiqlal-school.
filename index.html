<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة نتائج الامتحانات الاستقلال</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --primary: #1e3a8a; --accent: #b45309; --success: #059669; --danger: #e11d48; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #cbd5e1; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding: 10px; min-height: 100vh; }
        .container { max-width: 1000px; margin: 10px auto; position: relative; }
        .main-card { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #e2e8f0; font-weight: 700; cursor: pointer; color: #64748b; }
        .tab-btn.active { background: var(--primary); color: white; }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        input, select { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid var(--border); background: #f8fafc; outline: none; margin-bottom: 10px; text-align: center; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 17px; }
        .btn-primary { background: var(--primary); color: white; }
        #resultView { display: none; margin-top: 20px; padding: 10px; border-radius: 12px; background: #fff; }
        .res-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid var(--border); }
        .res-table th { background: var(--primary); color: white; padding: 6px 1px; font-size: 9px; border: 1px solid #fff; }
        .res-table td { padding: 8px 1px; border: 1px solid #e2e8f0; text-align: center; font-weight: 900; font-size: 12px; }
        .summary-box { border: 2px solid var(--primary); background: #f8fafc; border-radius: 0 0 10px 10px; }
        .grid-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 5px; text-align: center; font-size: 11px; font-weight: bold; color: var(--primary); margin: 10px 0; }
        .bulk-student-box { border: 2px solid var(--primary); border-radius: 15px; padding: 15px; margin-bottom: 20px; background: #fff; }
        .bulk-row-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 5px; align-items: center; margin-bottom: 8px; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px; }
        .bulk-row-grid input { margin-bottom: 0; padding: 6px; font-size: 13px; }
        .dev-footer-simple { text-align: center; margin-top: 30px; padding: 20px; font-weight: 700; border-top: 1px solid #e2e8f0; }
        @media print { .btn, .search-container, #adminPortal, .admin-tabs, .dev-footer-simple { display: none !important; } #resultView { display: block !important; } }
    </style>
</head>
<body>

<div class="container" id="searchSection">
    <div class="main-card">
        <div style="text-align:center; margin-bottom:20px;">
            <div style="font-size:40px; color:var(--primary); cursor:pointer;" ondblclick="enterAdmin()"><i class="fas fa-school"></i></div>
            <h1 style="margin: 0; font-size: 24px; font-weight: 900; color: var(--primary);">منظومة نتائج الاستقلال</h1>
            <p style="color: #64748b; font-weight: 700;">نتائج الامتحانات 2026</p>
        </div>
        <div style="max-width:400px; margin:0 auto;">
            <input type="number" id="searchID" placeholder="الرقم الوطني للطالبة...">
            <button class="btn btn-primary" onclick="loadResult()"><i class="fas fa-search"></i> استخراج النتيجة</button>
        </div>
        <div id="resultView">
            <h2 id="outName" style="text-align:center;"></h2>
            <div id="outYear" style="text-align:center; color:var(--accent); font-weight:800;"></div>
            <table class="res-table">
                <thead><tr><th>المادة</th><th>الأعمال</th><th>الصغرى</th><th>الامتحان</th><th>الكبرى</th><th>المجموع</th></tr></thead>
                <tbody id="resTbody"></tbody>
            </table>
            <div class="summary-box">
                <div style="display:flex; justify-content:space-between; padding:10px;"><span>المجموع:</span><span id="outTotalSum" style="font-weight:900;"></span></div>
                <div style="display:flex; justify-content:space-between; padding:10px;"><span>النسبة:</span><span id="outPercent" style="font-weight:900;"></span></div>
                <div style="display:flex; justify-content:space-between; padding:10px;"><span>التقدير:</span><span id="outGrade" style="font-weight:900;"></span></div>
            </div>
            <button class="btn" style="background:#475569; color:white; margin-top:20px;" onclick="window.print()"><i class="fas fa-print"></i> طباعة</button>
        </div>
        <div class="dev-footer-simple">تم تطويره بواسطة عماد الدين نجم</div>
    </div>
</div>

<div class="container" id="adminPortal" style="display:none;">
    <div class="main-card">
        <h2 style="text-align:center; color:var(--primary);">بوابة المطور</h2>
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showTab('individualTab', this)">الرصد الفردي</button>
            <button class="tab-btn" onclick="showTab('bulkTab', this)">الرصد الجماعي</button>
        </div>
        <div id="individualTab" class="admin-section active">
            <input type="number" id="editID" placeholder="الرقم الوطني للتعديل...">
            <button onclick="fetchForEdit()" class="btn" style="background:var(--primary); color:white; margin-bottom:15px;">جلب البيانات</button>
            <input type="text" id="inName" placeholder="الاسم الرباعي">
            <input type="number" id="inID" placeholder="الرقم الوطني الجديد">
            <select id="inYear" onchange="autoFillSubjects()">
                <option value="">-- اختر الصف --</option>
                <option value="خامس">خامس</option><option value="سادس">سادس</option>
                <option value="سابع">سابع</option><option value="ثامن">ثامن</option>
            </select>
            <div id="subjectsContainer"></div>
            <button class="btn" style="background:var(--success); color:white;" onclick="saveToFirebase()">حفظ الطالبة</button>
            <button class="btn" style="background:var(--danger); color:white; margin-top:10px;" onclick="deleteStudent()">حذف</button>
        </div>
        <div id="bulkTab" class="admin-section">
            <select id="bulkSelectYear" onchange="loadBulkStudentsList()">
                <option value="">-- اختر الصف --</option>
                <option value="خامس">خامس</option><option value="سادس">سادس</option>
                <option value="سابع">سابع</option><option value="ثامن">ثامن</option>
            </select>
            <div id="bulkStudentsContainer"></div>
            <button id="saveAllBulkBtn" class="btn" style="display:none; background:var(--success); color:white; margin-top:15px;" onclick="saveAllBulkData()">حفظ الكل</button>
        </div>
        <button onclick="location.reload()" class="btn" style="background:none; margin-top:20px;">خروج</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDKEPjQMKD2lt74sdGM0k7hY2Wb8E-X55g", 
      databaseURL: "https://istiqlal-school-302c8-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school-302c8",
      appId: "1:1037263844752:web:56dc0ba0d346045610a514"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const schoolSubjects = {
        "خامس": ["التاريخ", "التربية الإسلامية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "اللغة العربية"],
        "سادس": ["التاريخ", "التربية الإسلامية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "اللغة العربية"],
        "سابع": ["التاريخ", "التربية الإسلامية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "اللغة العربية"],
        "ثامن": ["التاريخ", "التربية الإسلامية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "اللغة العربية"]
    };

    function enterAdmin() {
        const pass = prompt("رمز المطور:");
        db.ref('settings/dev_pass').once('value', snap => {
            if(String(pass).trim() === String(snap.val()).trim()) {
                document.getElementById('searchSection').style.display='none';
                document.getElementById('adminPortal').style.display='block';
            } else alert("خطأ");
        });
    }

    function showTab(tabId, btn) {
        document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active'); btn.classList.add('active');
    }

    function autoFillSubjects() {
        const yr = document.getElementById('inYear').value;
        const con = document.getElementById('subjectsContainer'); con.innerHTML = "";
        if(schoolSubjects[yr]) {
            schoolSubjects[yr].forEach(s => {
                const div = document.createElement('div'); div.className = "subject-row";
                div.innerHTML = `<input type="hidden" class="m-name" value="${s}">
                <div style="display:grid; grid-template-columns:2fr 1fr 1fr; gap:5px; margin-bottom:5px;">
                <span style="font-size:12px; font-weight:bold;">${s}</span>
                <input type="number" class="m-w-got" placeholder="أعمال">
                <input type="number" class="m-e-got" placeholder="امتحان">
                </div>`;
                con.appendChild(div);
            });
        }
    }

    function saveToFirebase() {
        const id = document.getElementById('inID').value;
        const name = document.getElementById('inName').value;
        const yr = document.getElementById('inYear').value;
        if(!id || !name || !yr) return alert("أكمل البيانات أولاً");

        let subs = {}; let tS = 0; let tM = 0;
        document.querySelectorAll('.subject-row').forEach(row => {
            const n = row.querySelector('.m-name').value;
            const wg = parseFloat(row.querySelector('.m-w-got').value) || 0;
            const eg = parseFloat(row.querySelector('.m-e-got').value) || 0;
            subs[n] = { wG: row.querySelector('.m-w-got').value, eG: row.querySelector('.m-e-got').value, wM: 40, eM: 60, sum: (wg+eg), max: 100 };
            tS += (wg+eg); tM += 100;
        });

        db.ref('students/' + id).set({ name, year: yr, subjects: subs, totalGot: tS, totalMax: tM, percent: ((tS/tM)*100).toFixed(1) })
        .then(() => { 
            alert("تم الحفظ بنجاح"); 
            document.getElementById('inName').value = ""; document.getElementById('inID').value = ""; 
            document.querySelectorAll('.m-w-got, .m-e-got').forEach(i => i.value = "");
        }).catch(e => alert("خطأ: " + e));
    }

    function loadBulkStudentsList() {
        const yr = document.getElementById('bulkSelectYear').value;
        const container = document.getElementById('bulkStudentsContainer');
        if(!yr) return; container.innerHTML = "جاري التحميل...";
        db.ref('students').orderByChild('year').equalTo(yr).once('value', snap => {
            let h = "";
            snap.forEach(child => {
                const s = child.val(); const sid = child.key;
                h += `<div class="bulk-student-box" data-id="${sid}"><strong>${s.name}</strong>`;
                schoolSubjects[yr].forEach(sub => {
                    const ex = (s.subjects && s.subjects[sub]) ? s.subjects[sub] : {wG:'', eG:''};
                    h += `<div class="bulk-row-grid" data-sub="${sub}"><span>${sub}</span>
                    <input type="number" class="bw-g" value="${ex.wG}" placeholder="أعمال">
                    <input type="number" class="be-g" value="${ex.eG}" placeholder="امتحان"></div>`;
                });
                h += `</div>`;
            });
            container.innerHTML = h; document.getElementById('saveAllBulkBtn').style.display = 'block';
        });
    }

    async function saveAllBulkData() {
        const boxes = document.querySelectorAll('.bulk-student-box');
        for(let box of boxes) {
            const sid = box.getAttribute('data-id');
            let subs = {}; let tS = 0; let tM = 0;
            box.querySelectorAll('.bulk-row-grid').forEach(row => {
                const n = row.getAttribute('data-sub');
                const wg = parseFloat(row.querySelector('.bw-g').value) || 0;
                const eg = parseFloat(row.querySelector('.be-g').value) || 0;
                subs[n] = { wG: row.querySelector('.bw-g').value, eG: row.querySelector('.be-g').value, wM: 40, eM: 60, sum: (wg+eg), max: 100 };
                tS += (wg+eg); tM += 100;
            });
            await db.ref('students/'+sid).update({ subjects: subs, totalGot: tS, totalMax: tM, percent: ((tS/tM)*100).toFixed(1) });
        }
        alert("تم الحفظ بنجاح");
    }

    function loadResult() {
        const sid = document.getElementById('searchID').value;
        db.ref('students/'+sid).once('value', snap => {
            if(snap.exists()) showData(snap.val()); else alert("الرقم غير موجود");
        });
    }

    function showData(d) {
        document.getElementById('resultView').style.display='block';
        document.getElementById('outName').innerText = d.name;
        document.getElementById('outYear').innerText = "الصف: " + d.year;
        let h = "";
        for(let k in d.subjects) {
            const s = d.subjects[k];
            h += `<tr><td>${k}</td><td>${s.wG}</td><td>${s.wM}</td><td>${s.eG}</td><td>${s.eM}</td><td>${s.sum}</td></tr>`;
        }
        document.getElementById('resTbody').innerHTML = h;
        document.getElementById('outTotalSum').innerText = d.totalGot;
        document.getElementById('outPercent').innerText = d.percent + "%";
    }

    function fetchForEdit() {
        const id = document.getElementById('editID').value;
        db.ref('students/'+id).once('value', snap => {
            if(snap.exists()){
                const d = snap.val();
                document.getElementById('inName').value = d.name; document.getElementById('inID').value = id; document.getElementById('inYear').value = d.year;
                autoFillSubjects();
            }
        });
    }

    function deleteStudent() {
        const id = document.getElementById('inID').value;
        if(id && confirm("حذف؟")) db.ref('students/'+id).remove().then(()=>location.reload());
    }
</script>
</body>
</html>
