<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة نتائج مدرسة الاستقلال</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --danger: #ef4444; --success: #22c55e; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 800px; margin: auto; }
        
        /* واجهة العرض العامة */
        .header { text-align: center; padding: 30px 10px; background: var(--card); border-radius: 20px; border-bottom: 5px solid var(--accent); margin-bottom: 20px; position: relative; }
        .logo-icon { font-size: 50px; cursor: pointer; user-select: none; }
        
        .search-section { background: var(--card); padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .search-input { width: 90%; padding: 15px; border-radius: 10px; border: 2px solid #334155; background: #0f172a; color: white; font-size: 18px; text-align: center; font-family: 'Tajawal'; }
        .btn-search { width: 90%; background: var(--accent); color: #0f172a; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 18px; margin-top: 15px; border: none; cursor: pointer; }

        /* نتيجة البحث */
        #resultArea { margin-top: 20px; display: none; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--accent); }
        .res-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #334155; }

        /* بوابة المطور (مخفية) */
        #adminPortal { display: none; background: #000000e6; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .admin-content { max-width: 600px; margin: auto; background: var(--card); padding: 20px; border-radius: 15px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .admin-grid input, .full-in { background: #334155; border: 1px solid #475569; color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; font-family: 'Tajawal'; }
        .close-admin { background: var(--danger); color: white; padding: 5px 15px; float: left; border-radius: 5px; cursor: pointer; }

        /* جدول التحكم في المطور */
        .admin-table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 14px; }
        .admin-table th, .admin-table td { padding: 10px; border: 1px solid #334155; text-align: center; }
        .btn-edit { background: var(--success); color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; }
        .btn-del { background: var(--danger); color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-icon" onclick="checkAdmin()">🎓</div>
        <h1>منظومة نتائج مدرسة الاستقلال</h1>
        <p>أدخل الرقم الوطني أو رقم القيد لعرض النتيجة</p>
    </div>

    <div class="search-section">
        <input type="text" id="publicSearch" class="search-input" placeholder="اكتب الرقم هنا...">
        <button class="btn-search" onclick="findStudent()">عرض النتيجة الآن 🔍</button>
        
        <div id="resultArea">
            <h3 id="resName" style="color: var(--accent);"></h3>
            <div class="res-row"><span>الرياضيات:</span> <span id="resMath"></span></div>
            <div class="res-row"><span>اللغة العربية:</span> <span id="resAra"></span></div>
            <div class="res-row"><span>النسبة المئوية:</span> <span id="resTotal" style="font-weight: bold; color: var(--success);"></span></div>
        </div>
    </div>
</div>

<div id="adminPortal">
    <div class="admin-content">
        <span class="close-admin" onclick="document.getElementById('adminPortal').style.display='none'">إغلاق X</span>
        <h2 style="color: var(--accent);">لوحة التحكم (المطور)</h2>
        
        <div class="admin-grid">
            <input type="hidden" id="key">
            <input type="text" id="n" class="full-in" style="grid-column: span 2;" placeholder="اسم الطالب">
            <input type="text" id="id" class="full-in" style="grid-column: span 2;" placeholder="الرقم الوطني">
            <input type="number" id="mw" placeholder="رياضيات أعمال">
            <input type="number" id="me" placeholder="رياضيات امتحان">
            <input type="number" id="aw" placeholder="عربي أعمال">
            <input type="number" id="ae" placeholder="عربي امتحان">
            <button onclick="save()" class="btn-search" style="grid-column: span 2; background: var(--success); color: white;">حفظ / تحديث 💾</button>
        </div>

        <table class="admin-table">
            <thead>
                <tr><th>الاسم</th><th>إجراء</th></tr>
            </thead>
            <tbody id="adminList"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://istiqlal-school-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("students");

    // وظيفة الجمهور: البحث
    function findStudent() {
        const id = document.getElementById('publicSearch').value;
        if(!id) return alert("الرجاء إدخال الرقم");
        
        db.orderByChild("id").equalTo(id).once("value", snapshot => {
            if(snapshot.exists()){
                const data = Object.values(snapshot.val())[0];
                document.getElementById('resultArea').style.display = 'block';
                document.getElementById('resName').innerText = data.name;
                document.getElementById('resMath').innerText = (parseFloat(data.mathW) + parseFloat(data.mathE));
                document.getElementById('resAra').innerText = (parseFloat(data.araW) + parseFloat(data.araE));
                const total = ((parseFloat(data.mathW)+parseFloat(data.mathE)+parseFloat(data.araW)+parseFloat(data.araE))/200)*100;
                document.getElementById('resTotal').innerText = total.toFixed(1) + "%";
            } else {
                alert("عذراً، الرقم غير موجود");
            }
        });
    }

    // وظيفة المطور: الدخول السري
    function checkAdmin() {
        const pass = prompt("أدخل كلمة مرور المطور للدخول:");
        if(pass === "7474") { // يمكنك تغيير كلمة المرور هنا
            document.getElementById('adminPortal').style.display = 'block';
        } else {
            alert("خطأ! أنت لا تملك صلاحية المطور.");
        }
    }

    // المطور: الحفظ
    function save() {
        const k = document.getElementById('key').value;
        const d = {
            name: document.getElementById('n').value, id: document.getElementById('id').value,
            mathW: document.getElementById('mw').value, mathE: document.getElementById('me').value,
            araW: document.getElementById('aw').value, araE: document.getElementById('ae').value
        };
        if(k) db.child(k).update(d); else db.push(d);
        alert("تمت العملية بنجاح");
        reset();
    }

    // المطور: عرض القائمة للتحكم
    db.on('value', snap => {
        const list = document.getElementById('adminList');
        list.innerHTML = "";
        snap.forEach(child => {
            const s = child.val();
            list.innerHTML += `<tr>
                <td>${s.name}</td>
                <td>
                    <button class="btn-edit" onclick="edit('${child.key}','${s.name}','${s.id}','${s.mathW}','${s.mathE}','${s.araW}','${s.araE}')">تعديل</button>
                    <button class="btn-del" onclick="del('${child.key}')">حذف</button>
                </td>
            </tr>`;
        });
    });

    function edit(k,n,id,mw,me,aw,ae){
        document.getElementById('key').value=k; document.getElementById('n').value=n;
        document.getElementById('id').value=id; document.getElementById('mw').value=mw;
        document.getElementById('me').value=me; document.getElementById('aw').value=aw;
        document.getElementById('ae').value=ae;
    }

    function del(k){ if(confirm("حذف؟")) db.child(k).remove(); }
    function reset(){ document.getElementById('key').value=""; document.querySelectorAll('.admin-grid input').forEach(i=>i.value=""); }
</script>
</body>
</html>
